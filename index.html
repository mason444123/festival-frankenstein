<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Festival Frankenstein</title>
  <style>
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; background:#000; }
    body { overflow-x:hidden; font-family:Arial,Helvetica,sans-serif; }

    /* SandlerFest hero — copied interaction and geometry */
    #video-wrapper { position:relative; width:100%; height:100vh; height:100svh; overflow:hidden; background:#000; }
    #bgvid { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; z-index:0; opacity:0; transition:opacity 1s ease; }
    #overlay-container { position:absolute; inset:0; background:rgba(0,0,0,.35); display:flex; justify-content:center; align-items:center; z-index:2; opacity:0; transition:opacity 1s ease; pointer-events:none; }
    #overlay-logo { width:80vw; max-width:800px; min-width:180px; display:block; opacity:.85; color:#fff; text-align:center; font-family:Arial,Helvetica,sans-serif; font-size:clamp(42px,10vw,154px); font-weight:900; letter-spacing:-.075em; line-height:.82; text-transform:lowercase; }

    #video-cover { position:fixed; inset:0; width:100vw; height:100vh; height:100svh; background:#000; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:9999; cursor:pointer; transition:opacity .5s ease; overflow:hidden; }
    #cover-logo { width:80vw; max-width:800px; min-width:180px; margin:0 0 20px; color:#fff; text-align:center; font-family:Arial,Helvetica,sans-serif; font-size:clamp(42px,10vw,154px); font-weight:900; letter-spacing:-.075em; line-height:.82; text-transform:lowercase; opacity:.85; }
    #play-button { width:80px; height:80px; background:url('https://sandlerstudio.ru/wp-content/uploads/2025/08/4bb904e9d4c59a85298a015f06bf1fbe.png') no-repeat center/contain; border:0; outline:0; cursor:pointer; animation:pulse 2s infinite; z-index:1; }
    .curtain { position:fixed; top:0; width:50vw; height:100vh; height:100svh; background:#000; z-index:9998; transition:transform 1.5s ease; }
    .curtain.left { left:0; transform:translateX(0); }
    .curtain.right { right:0; transform:translateX(0); }
    body.video-started .curtain.left { transform:translateX(-100%); }
    body.video-started .curtain.right { transform:translateX(100%); }
    body.video-started #overlay-container { opacity:1; }
    @keyframes pulse { 0%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:.7} 100%{transform:scale(1);opacity:1} }

    /* Exact mobile burger geometry from SandlerFest / Tilda's t-menuburger_second. */
    .tmenu-mobile { position:fixed; z-index:10001; inset:0 0 auto; height:64px; display:none; background:#111; }
    .tmenu-mobile.is-visible { display:block; }
    .tmenu-mobile__container { position:relative; width:100%; height:64px; }
    .t-menuburger { position:absolute; top:22px; right:20px; width:28px; height:20px; padding:0; border:0; background:transparent; cursor:pointer; transition:transform .5s ease-in-out; }
    .t-menuburger span { position:absolute; right:0; display:block; height:3px; background:#bf1212; transition:.25s ease-in-out; }
    .t-menuburger span:nth-child(1) { top:0; width:28px; }
    .t-menuburger span:nth-child(2), .t-menuburger span:nth-child(3) { top:8px; width:80%; }
    .t-menuburger span:nth-child(4) { top:16px; width:28px; }
    .site-menu { position:fixed; z-index:10000; inset:64px 0 0; display:none; overflow:auto; background:#000; color:#fff; padding:40px 9vw 8vw; }
    .site-menu.is-open { display:block; }.site-menu a { display:block; width:max-content; color:#fff; text-decoration:none; font-size:clamp(28px,5vw,74px); line-height:1; margin:.17em 0; }
    .site-menu .nav-menu-buy { margin-top:28px; color:#bf1212; }

    /* Il Capo project sequence: red scroll canvas, portrait media card and typography layered over it. */
    .projects { position:relative; overflow:hidden; padding:0 0 clamp(80px,12vw,180px); background:#d60001; color:#050505; }
    .project-stage { position:relative; padding:clamp(100px,13vw,180px) 5vw 0; }
    .project-card { position:relative; width:100%; overflow:visible; background:transparent; }
    .project-meta { width:min(84vw,1180px); margin:0 auto clamp(38px,5vw,76px); display:grid; grid-template-columns:clamp(38px,5vw,70px) 1fr; gap:clamp(16px,2.5vw,42px); font-size:clamp(17px,2.2vw,33px); font-weight:400; line-height:1; text-transform:uppercase; }
    .project-media { position:relative; width:min(84vw,980px); aspect-ratio:.72; margin:0 auto; overflow:hidden; background:#2b1614; clip-path:inset(0 48% 0 48%); transform:scale(.92); transition:clip-path 1.05s cubic-bezier(.77,0,.18,1),transform 1.05s cubic-bezier(.22,1,.36,1); }
    .project-card.is-visible .project-media { clip-path:inset(0); transform:scale(1); }
    .project-media::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,.08); pointer-events:none; }
    .project-media img { display:block; width:100%; height:100%; object-fit:cover; transform:scale(1.08); transition:transform 1.35s cubic-bezier(.22,1,.36,1); }
    .project-card.is-visible .project-media img { transform:scale(1); }
    .project-copy { position:absolute; z-index:1; inset:0; display:flex; flex-direction:column; justify-content:space-between; padding:11% 5% 9%; color:#d60001; text-align:center; pointer-events:none; opacity:0; transition:opacity .25s linear .5s; }
    .project-card.is-visible .project-copy { opacity:1; }
    .project-title { margin:0; font-family:Didot,"Bodoni MT",Georgia,serif; font-size:clamp(52px,8.6vw,126px); font-weight:400; letter-spacing:-.07em; line-height:.84; text-transform:uppercase; }
    .project-subtitle { margin:0; font-size:clamp(16px,2.1vw,31px); font-weight:400; line-height:1; text-transform:uppercase; }
    .project-play { position:absolute; z-index:2; top:50%; left:50%; display:grid; place-items:center; width:clamp(62px,8vw,116px); aspect-ratio:1; border:0; border-radius:50%; transform:translate(-50%,-50%) scale(.75); background:rgba(23,17,17,.68); color:#fff; opacity:0; transition:transform .5s cubic-bezier(.22,1,.36,1) .65s,opacity .2s .65s; }
    .project-play::before { content:''; margin-left:7%; border-top:16px solid transparent; border-bottom:16px solid transparent; border-left:25px solid currentColor; }
    .project-card.is-visible .project-play { transform:translate(-50%,-50%) scale(1); opacity:1; }
    @media (max-width:768px) { .project-stage{padding:76px 0 0}.project-meta{width:84vw;margin-bottom:42px;font-size:18px;grid-template-columns:42px 1fr;gap:16px}.project-media{width:84vw;aspect-ratio:.64}.project-copy{padding:18% 4% 11%}.project-title{font-size:clamp(48px,13vw,86px)}.project-subtitle{font-size:18px}.project-play::before{border-top-width:13px;border-bottom-width:13px;border-left-width:20px} }
    @media (prefers-reduced-motion:reduce) { .project-media,.project-media img,.project-copy{transition:none}.project-media{clip-path:none}.project-copy{transform:none;opacity:1} }
    @media (min-width:769px) { .tmenu-mobile { display:none !important; } }
  </style>
</head>
<body>
  <div class="tmenu-mobile" id="mobileMenuBar">
    <div class="tmenu-mobile__container">
      <button class="t-menuburger t-menuburger_second" id="menuTrigger" type="button" aria-label="Навигационное меню" aria-expanded="false"><span></span><span></span><span></span><span></span></button>
    </div>
  </div>
  <nav class="site-menu" id="siteMenu" aria-hidden="true">
    <a href="https://mason444123.github.io/sait-design-lab/">Главная</a>
    <a href="https://mason444123.github.io/sait-design-lab/#about">О событии</a>
    <a href="https://mason444123.github.io/sait-design-lab/#mini-preso">Команда</a>
    <a href="https://mason444123.github.io/sait-design-lab/#lineup">Программа</a>
    <a href="https://mason444123.github.io/sait-design-lab/shop.html">Магазин</a>
    <a href="https://mason444123.github.io/sait-design-lab/past-events.html">Прошлые события</a>
    <a href="https://mason444123.github.io/sait-design-lab/#faq">FAQ</a>
    <a href="https://voroh.ru/widget/event/1036665/019ef4a4-09d5-8687-8cf4-a35183b37649/" target="_blank" rel="noopener" class="nav-menu-buy">Купить билет</a>
  </nav>

  <div id="video-cover" aria-label="Запустить сайт">
    <div id="cover-logo" aria-label="custom843">custom843</div>
    <button id="play-button" aria-label="Запустить видео"></button>
  </div>
  <div class="curtain left"></div><div class="curtain right"></div>
  <main id="video-wrapper">
    <video id="bgvid" muted loop playsinline preload="metadata">
      <source media="(max-width: 768px)" src="assets/hero-mobile.mp4" type="video/mp4">
      <source src="assets/hero-desktop.mp4" type="video/mp4">
    </video>
    <div id="overlay-container"><div id="overlay-logo" aria-label="custom843">custom843</div></div>
  </main>

  <section class="projects" aria-label="Selected work">
    <div class="project-stage"><article class="project-card" data-project><div class="project-meta"><span>00</span><span>IL CAPO PRODUCTION</span></div><figure class="project-media"><img src="assets/projects/main.jpg" alt="Il Capo Production" loading="lazy"><div class="project-copy"><h2 class="project-title">Industrial<br>Cinema</h2><p class="project-subtitle">Production</p></div><button class="project-play" type="button" aria-label="Открыть проект"></button></figure></article></div>
    <div class="project-stage"><article class="project-card" data-project><div class="project-meta"><span>01</span><span>MAISON MARGIELA</span></div><figure class="project-media"><img src="assets/projects/tabi.jpg" alt="Maison Margiela Tabi" loading="lazy"><div class="project-copy"><h2 class="project-title">A Tabi<br>Film</h2><p class="project-subtitle">Iconic Shoe Masterpiece</p></div><button class="project-play" type="button" aria-label="Открыть проект"></button></figure></article></div>
    <div class="project-stage"><article class="project-card" data-project><div class="project-meta"><span>02</span><span>JUVENTUS - ARTISSIMA</span></div><figure class="project-media"><img src="assets/projects/juventus.jpg" alt="Juventus Artissima" loading="lazy"><div class="project-copy"><h2 class="project-title">Il Tappeto<br>Verde</h2><p class="project-subtitle">Junior Project</p></div><button class="project-play" type="button" aria-label="Открыть проект"></button></figure></article></div>
    <div class="project-stage"><article class="project-card" data-project><div class="project-meta"><span>03</span><span>VALENTINO</span></div><figure class="project-media"><img src="assets/projects/valentino.jpg" alt="Valentino" loading="lazy"><div class="project-copy"><h2 class="project-title">Le Pavillon<br>Des Folies</h2><p class="project-subtitle">Dans Valentino</p></div><button class="project-play" type="button" aria-label="Открыть проект"></button></figure></article></div>
    <div class="project-stage"><article class="project-card" data-project><div class="project-meta"><span>04</span><span>BUCCELLATI</span></div><figure class="project-media"><img src="assets/projects/buccellati.jpg" alt="Buccellati" loading="lazy"><div class="project-copy"><h2 class="project-title">Mosaico<br>Bren</h2><p class="project-subtitle">Heritage Film</p></div><button class="project-play" type="button" aria-label="Открыть проект"></button></figure></article></div>
    <div class="project-stage"><article class="project-card" data-project><div class="project-meta"><span>05</span><span>GUCCI</span></div><figure class="project-media"><img src="assets/projects/gucci.jpg" alt="Gucci" loading="lazy"><div class="project-copy"><h2 class="project-title">Maison de<br>L'Amour</h2><p class="project-subtitle">A Defining Fashion Film</p></div><button class="project-play" type="button" aria-label="Открыть проект"></button></figure></article></div>
  </section>
  <script>
    const cover=document.getElementById('video-cover'), video=document.getElementById('bgvid'), overlay=document.getElementById('overlay-container'), play=document.getElementById('play-button');
    const menuTrigger=document.getElementById('menuTrigger'), menu=document.getElementById('siteMenu'), mobileMenuBar=document.getElementById('mobileMenuBar');
    play.addEventListener('click', async event => {
      event.stopPropagation(); cover.style.opacity='0';
      setTimeout(()=>{ cover.style.display='none'; document.body.classList.add('video-started'); video.style.opacity='1'; mobileMenuBar.classList.add('is-visible'); },500);
      try { await video.play(); setTimeout(()=>{ overlay.style.opacity='1'; },1500); } catch(error) { console.warn('Видео не запустилось',error); }
    });
    menuTrigger.addEventListener('click',()=>{ const open=menuTrigger.getAttribute('aria-expanded')==='true'; menuTrigger.setAttribute('aria-expanded',String(!open)); menu.classList.toggle('is-open',!open); menu.setAttribute('aria-hidden',String(open)); });
    document.querySelectorAll('[data-project]').forEach(card => {
      new IntersectionObserver(entries => entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('is-visible'); }), { threshold:.22 }).observe(card);
    });
  </script>
</body>
</html>
