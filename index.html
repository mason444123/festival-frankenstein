<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Festival Frankenstein</title>
  <style>
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; background:#000; }
    body { overflow-x:hidden; font-family:Arial,Helvetica,sans-serif; }

    /* SandlerFest hero — copied interaction and geometry */
    #video-wrapper { position:relative; width:100%; height:100vh; height:100svh; overflow:hidden; background:#000; }
    #bgvid { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; z-index:0; opacity:0; transition:opacity 1s ease; }
    #overlay-container { position:absolute; inset:0; background:rgba(0,0,0,.35); display:flex; justify-content:center; align-items:center; z-index:2; opacity:0; transition:opacity 1s ease; pointer-events:none; }
    #overlay-logo { width:80vw; max-width:800px; min-width:180px; display:block; opacity:.85; }

    #video-cover { position:fixed; inset:0; width:100vw; height:100vh; height:100svh; background:#000; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:9999; cursor:pointer; transition:opacity .5s ease; overflow:hidden; }
    #video-cover img { width:80vw; max-width:800px; min-width:180px; opacity:.85; margin-bottom:20px; }
    #play-button { width:80px; height:80px; background:url('https://sandlerstudio.ru/wp-content/uploads/2025/08/4bb904e9d4c59a85298a015f06bf1fbe.png') no-repeat center/contain; border:0; outline:0; cursor:pointer; animation:pulse 2s infinite; z-index:1; }
    .curtain { position:fixed; top:0; width:50vw; height:100vh; height:100svh; background:#000; z-index:9998; transition:transform 1.5s ease; }
    .curtain.left { left:0; transform:translateX(0); }
    .curtain.right { right:0; transform:translateX(0); }
    body.video-started .curtain.left { transform:translateX(-100%); }
    body.video-started .curtain.right { transform:translateX(100%); }
    body.video-started #overlay-container { opacity:1; }
    @keyframes pulse { 0%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:.7} 100%{transform:scale(1);opacity:1} }

    /* The source burger: four 2px red bars, used here as the separate menu element requested. */
    .menu-trigger { position:fixed; z-index:10001; right:28px; top:28px; width:48px; height:44px; display:none; place-items:center; border:0; background:transparent; cursor:pointer; }
    .menu-trigger span { display:block; width:28px; height:2px; margin:4px 0; background:#bf1212; transform-origin:center; transition:transform .3s ease,opacity .2s ease; }
    .menu-trigger.is-visible { display:grid; }
    .menu-trigger[aria-expanded="true"] span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    .menu-trigger[aria-expanded="true"] span:nth-child(2){opacity:0}.menu-trigger[aria-expanded="true"] span:nth-child(3){opacity:0}
    .menu-trigger[aria-expanded="true"] span:nth-child(4){transform:translateY(-6px) rotate(-45deg)}
    .site-menu { position:fixed; z-index:10000; inset:0; display:none; background:#000; color:#fff; padding:90px 9vw 8vw; }
    .site-menu.is-open { display:block; }.site-menu a { display:block; width:max-content; color:#fff; text-decoration:none; font-size:clamp(34px,6vw,86px); line-height:1; margin:.17em 0; }

    @media (max-width:768px) { .menu-trigger.is-visible { right:14px; top:13px; } }
  </style>
</head>
<body>
  <button class="menu-trigger" id="menuTrigger" type="button" aria-label="Навигационное меню" aria-expanded="false"><span></span><span></span><span></span><span></span></button>
  <nav class="site-menu" id="siteMenu" aria-hidden="true"><a href="#">Главная</a><a href="#">Скоро здесь</a></nav>

  <div id="video-cover" aria-label="Запустить сайт">
    <img src="https://sandlerstudio.ru/wp-content/uploads/2025/08/%D0%92%D0%B5%D0%BA%D1%82%D0%BE%D1%80%D0%BD%D1%8B%D0%B9-%D1%81%D0%BC%D0%B0%D1%80%D1%82-%D0%BE%D0%B1%D1%8A%D0%B5%D0%BA%D1%822.png" alt="Логотип">
    <button id="play-button" aria-label="Запустить видео"></button>
  </div>
  <div class="curtain left"></div><div class="curtain right"></div>
  <main id="video-wrapper">
    <video id="bgvid" muted loop playsinline preload="metadata"><source src="https://sandlerstudio.ru/wp-content/uploads/2025/08/N-N-2025-video-converter.com_.mp4" type="video/mp4"></video>
    <div id="overlay-container"><img id="overlay-logo" src="https://sandlerstudio.ru/wp-content/uploads/2026/03/%D0%BB%D0%BE%D0%B3%D0%BE2026.png" alt="Логотип"></div>
  </main>
  <script>
    const cover=document.getElementById('video-cover'), video=document.getElementById('bgvid'), overlay=document.getElementById('overlay-container'), play=document.getElementById('play-button');
    const menuTrigger=document.getElementById('menuTrigger'), menu=document.getElementById('siteMenu');
    play.addEventListener('click', async event => {
      event.stopPropagation(); cover.style.opacity='0';
      setTimeout(()=>{ cover.style.display='none'; document.body.classList.add('video-started'); video.style.opacity='1'; menuTrigger.classList.add('is-visible'); },500);
      try { await video.play(); setTimeout(()=>{ overlay.style.opacity='1'; },1500); } catch(error) { console.warn('Видео не запустилось',error); }
    });
    menuTrigger.addEventListener('click',()=>{ const open=menuTrigger.getAttribute('aria-expanded')==='true'; menuTrigger.setAttribute('aria-expanded',String(!open)); menu.classList.toggle('is-open',!open); menu.setAttribute('aria-hidden',String(open)); });
  </script>
</body>
</html>
